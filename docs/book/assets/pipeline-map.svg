<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Minto2 audio pipeline</title>
  <desc id="desc">Audio flows through VAD, STT, diarization, LLM correction, storage, search, and export.</desc>
  <rect width="1120" height="360" fill="#f8fafc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#1f2937">
    <rect x="40" y="126" width="120" height="74" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="100" y="171" text-anchor="middle">Audio</text>
    <rect x="210" y="126" width="120" height="74" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="270" y="171" text-anchor="middle">VAD</text>
    <rect x="380" y="126" width="120" height="74" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="440" y="171" text-anchor="middle">STT</text>
    <rect x="550" y="126" width="150" height="74" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="625" y="171" text-anchor="middle">Diarization</text>
    <rect x="750" y="126" width="120" height="74" rx="8" fill="#fce7f3" stroke="#db2777"/>
    <text x="810" y="171" text-anchor="middle">LLM</text>
    <rect x="920" y="126" width="150" height="74" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="995" y="171" text-anchor="middle">Search/Export</text>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M160 163 H210"/>
    <path d="M330 163 H380"/>
    <path d="M500 163 H550"/>
    <path d="M700 163 H750"/>
    <path d="M870 163 H920"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#475569">
    <text x="100" y="236" text-anchor="middle">PCM / source</text>
    <text x="270" y="236" text-anchor="middle">speech gate</text>
    <text x="440" y="236" text-anchor="middle">text</text>
    <text x="625" y="236" text-anchor="middle">who spoke when</text>
    <text x="810" y="236" text-anchor="middle">clean / summarize</text>
    <text x="995" y="236" text-anchor="middle">reuse knowledge</text>
  </g>
</svg>
