<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Diarization timeline</title>
  <desc id="desc">Speaker activity over time with overlap and final labels.</desc>
  <rect width="1120" height="360" fill="#f8fafc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" fill="#1f2937">
    <text x="70" y="86" font-size="24">Speaker A</text>
    <text x="70" y="166" font-size="24">Speaker B</text>
    <text x="70" y="246" font-size="24">Speaker C</text>
    <line x1="210" y1="80" x2="1040" y2="80" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="210" y1="160" x2="1040" y2="160" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="210" y1="240" x2="1040" y2="240" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="230" y="52" width="210" height="50" rx="8" fill="#bfdbfe"/>
    <rect x="520" y="52" width="260" height="50" rx="8" fill="#bfdbfe"/>
    <rect x="390" y="132" width="220" height="50" rx="8" fill="#bbf7d0"/>
    <rect x="700" y="132" width="260" height="50" rx="8" fill="#bbf7d0"/>
    <rect x="820" y="212" width="160" height="50" rx="8" fill="#fde68a"/>
    <text x="500" y="313" font-size="22" text-anchor="middle">overlap window</text>
    <path d="M520 205 C520 230, 700 230, 700 205" fill="none" stroke="#ef4444" stroke-width="4"/>
    <text x="625" y="36" font-size="26" text-anchor="middle">Who spoke when?</text>
  </g>
</svg>
