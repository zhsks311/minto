<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Speech model path</title>
  <desc id="desc">Waveform becomes spectrogram, encoder states, decoder outputs, and tokens.</desc>
  <rect width="1120" height="360" fill="#fbfbfd"/>
  <path d="M60 180 C95 90, 130 270, 165 180 S235 90, 270 180 S340 270, 375 180" fill="none" stroke="#2563eb" stroke-width="6"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" fill="#1f2937">
    <text x="220" y="88" font-size="26" text-anchor="middle">Waveform</text>
    <rect x="450" y="70" width="180" height="180" rx="8" fill="#ecfeff" stroke="#0891b2"/>
    <g fill="#67e8f9">
      <rect x="470" y="210" width="20" height="20"/>
      <rect x="500" y="170" width="20" height="60"/>
      <rect x="530" y="120" width="20" height="110"/>
      <rect x="560" y="150" width="20" height="80"/>
      <rect x="590" y="100" width="20" height="130"/>
    </g>
    <text x="540" y="286" font-size="24" text-anchor="middle">Spectrogram</text>
    <rect x="720" y="98" width="140" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <rect x="720" y="164" width="140" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="790" y="132" font-size="22" text-anchor="middle">Encoder</text>
    <text x="790" y="198" font-size="22" text-anchor="middle">Decoder</text>
    <rect x="940" y="124" width="110" height="72" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="995" y="169" font-size="24" text-anchor="middle">Tokens</text>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M385 180 H450"/>
    <path d="M630 160 H720"/>
    <path d="M860 160 H940"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
