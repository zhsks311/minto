<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Correction and summary boundary</title>
  <desc id="desc">Correction improves transcript fidelity while summary structures the meeting into decisions, todos, and questions, both grounded by context.</desc>
  <rect width="1120" height="430" fill="#f8fafc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" fill="#111827">
    <text x="560" y="48" font-size="30" text-anchor="middle" font-weight="700">Correction and Summary Are Different Jobs</text>
    <rect x="50" y="105" width="250" height="96" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="175" y="145" font-size="24" text-anchor="middle" font-weight="700">Raw Transcript</text>
    <text x="175" y="176" font-size="18" text-anchor="middle">STT output, errors included</text>
    <rect x="405" y="82" width="280" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="545" y="124" font-size="24" text-anchor="middle" font-weight="700">Correction</text>
    <text x="545" y="155" font-size="18" text-anchor="middle">fix terms, preserve meaning</text>
    <rect x="405" y="238" width="280" height="110" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="545" y="280" font-size="24" text-anchor="middle" font-weight="700">Summary</text>
    <text x="545" y="311" font-size="18" text-anchor="middle">structure decisions and tasks</text>
    <rect x="805" y="82" width="260" height="110" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="935" y="124" font-size="24" text-anchor="middle" font-weight="700">Clean Transcript</text>
    <text x="935" y="155" font-size="18" text-anchor="middle">readable, still faithful</text>
    <rect x="805" y="238" width="260" height="110" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="935" y="280" font-size="24" text-anchor="middle" font-weight="700">Meeting Notes</text>
    <text x="935" y="311" font-size="18" text-anchor="middle">agenda, decisions, todos</text>
    <rect x="120" y="266" width="180" height="58" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="210" y="302" font-size="20" text-anchor="middle">topic + glossary</text>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M300 153 H405"/>
    <path d="M685 137 H805"/>
    <path d="M300 153 C350 153, 352 293, 405 293"/>
    <path d="M685 293 H805"/>
    <path d="M300 295 H405"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" fill="#475569" font-size="18">
    <text x="560" y="392" text-anchor="middle">Rule: use context as evidence, not as permission to invent missing facts.</text>
  </g>
</svg>
