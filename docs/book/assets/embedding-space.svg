<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Embedding space</title>
  <desc id="desc">Sentences become vectors; similar meanings are close in embedding space while keyword-only matches can be far away.</desc>
  <rect width="1120" height="430" fill="#f8fafc"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="560" y="48" font-size="30" fill="#111827" text-anchor="middle" font-weight="700">Embedding Space</text>
    <line x1="120" y1="350" x2="980" y2="350" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="120" y1="350" x2="120" y2="90" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="985" y="382" font-size="18" fill="#475569">meaning axis A</text>
    <text x="34" y="92" font-size="18" fill="#475569">meaning axis B</text>
    <ellipse cx="325" cy="160" rx="170" ry="92" fill="#dbeafe" stroke="#2563eb" stroke-width="2" opacity="0.9"/>
    <ellipse cx="770" cy="210" rx="180" ry="100" fill="#dcfce7" stroke="#16a34a" stroke-width="2" opacity="0.9"/>
    <circle cx="285" cy="140" r="12" fill="#1d4ed8"/>
    <circle cx="350" cy="174" r="12" fill="#1d4ed8"/>
    <circle cx="405" cy="130" r="12" fill="#1d4ed8"/>
    <circle cx="720" cy="180" r="12" fill="#15803d"/>
    <circle cx="790" cy="224" r="12" fill="#15803d"/>
    <circle cx="855" cy="192" r="12" fill="#15803d"/>
    <circle cx="540" cy="312" r="12" fill="#db2777"/>
    <text x="325" y="88" font-size="22" fill="#1e3a8a" text-anchor="middle" font-weight="700">Export / Sharing</text>
    <text x="325" y="276" font-size="17" fill="#1e3a8a" text-anchor="middle">"Confluence로 공유"</text>
    <text x="325" y="302" font-size="17" fill="#1e3a8a" text-anchor="middle">"Markdown export"</text>
    <text x="770" y="112" font-size="22" fill="#14532d" text-anchor="middle" font-weight="700">Speaker / Diarization</text>
    <text x="770" y="335" font-size="17" fill="#14532d" text-anchor="middle">"화자 라벨"</text>
    <text x="770" y="361" font-size="17" fill="#14532d" text-anchor="middle">"누가 말했나"</text>
    <text x="540" y="292" font-size="17" fill="#9d174d" text-anchor="middle">keyword match can miss meaning</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
