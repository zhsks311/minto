name: CI

# feat/* → staging → main 흐름을 자동 게이트로 강제한다.
# staging/main 으로 가는 PR과 staging push에서 빌드+테스트를 검증한다.
on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging]
  workflow_dispatch:          # UI/`gh workflow run`으로 수동 실행 (재검증·재실행용)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26          # macOS 26 SDK + Xcode 26(Swift 6.3) 필수.
                               # SpeechAnalyzer/SpeechTranscriber가 macOS 26 API라 하위 SDK에선
                               # #available 게이팅에도 불구하고 컴파일 자체가 불가(심볼 부재).
                               # macos-15(Swift 6.1.2)에선 SDK 심볼 부재 + 구버전 Sendable로 빌드 실패.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # 아래 whitespace 비교에 base 커밋이 필요

      # 실제 사용된 툴체인을 로그에 남긴다 (Swift 6 미만이면 빌드가 실패하므로 진단용)
      - name: Toolchain
        run: swift --version

      # 공백 오류·conflict 마커 검출 (CLAUDE.md 기본 검증의 `git diff --check`)
      - name: Whitespace / conflict marker check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -n "$base" ]; then
            git diff --check "$base" HEAD
          else
            git diff --check HEAD^ HEAD
          fi

      # SPM 빌드 산출물 캐시 (WhisperKit/FluidAudio 등 대형 의존성 재빌드 회피)
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: /tmp/minto2-build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build --disable-sandbox --scratch-path /tmp/minto2-build

      # 테스트는 mock(로컬 URL·MockURLProtocol) 기반이라 모델 다운로드·네트워크 불필요.
      - name: Test
        run: swift test --disable-sandbox --scratch-path /tmp/minto2-test
